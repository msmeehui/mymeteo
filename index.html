<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyMeteo Amsterdam</title>
    <link rel="preconnect" href="https://api.open-meteo.com" />
    <link rel="preconnect" href="https://api.rainviewer.com" />
    <link rel="preconnect" href="https://tilecache.rainviewer.com" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQpNtwOm4P6kPAmj5Lci9v+gPqK01K8="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="weather-app" aria-live="polite">
      <header class="topbar">
        <div>
          <p class="eyebrow">MyMeteo</p>
          <h1>Amsterdam</h1>
          <p class="updated" id="updatedAt">Loading forecast...</p>
        </div>
        <button
          class="icon-button"
          id="refreshButton"
          type="button"
          aria-label="Refresh weather and radar data"
          title="Refresh weather and radar data"
        >
          <i data-lucide="refresh-cw" aria-hidden="true"></i>
        </button>
      </header>

      <section class="now-panel" aria-label="Current weather">
        <div class="current">
          <div class="condition-mark" aria-hidden="true">
            <i id="conditionIcon" data-lucide="cloud-sun"></i>
          </div>
          <div>
            <p class="temp" id="currentTemp">--°</p>
            <p class="condition" id="conditionLabel">Checking the sky</p>
          </div>
        </div>

        <dl class="metrics">
          <div>
            <dt>Max today</dt>
            <dd id="maxTemp">--°</dd>
          </div>
          <div>
            <dt>Wind</dt>
            <dd class="wind-value">
              <span class="wind-arrow" id="windArrow" aria-hidden="true"></span>
              <span id="windText">-- Bft</span>
            </dd>
          </div>
          <div>
            <dt>Rain today</dt>
            <dd id="rainAmount">-- mm</dd>
          </div>
        </dl>
      </section>

      <section class="radar-panel" aria-label="Rain radar">
        <div class="radar-head">
          <h2>Rain radar</h2>
          <time id="radarTime" hidden>Loading...</time>
        </div>
        <div class="radar-map-wrap">
          <div class="radar-map" id="radarMap"></div>
          <div class="rain-forecast-badge" id="rainForecastBadge">Loading rain forecast...</div>
        </div>
        <label class="radar-slider">
          <span class="slider-label">Time</span>
          <input id="radarSlider" type="range" min="0" max="0" value="0" step="1" disabled />
        </label>
      </section>

      <footer class="app-footer">Created by marc.smeehuijzen@easytech.nl with ChatGPT 5.5, May 2026</footer>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
